name: ci

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo test --locked --all-targets
      - run: cargo clippy --locked --all-targets -- -W clippy::pedantic -W clippy::nursery
  msrv:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.82
        with:
          components: clippy
      - run: cargo test --locked --all-targets
      - run: cargo clippy --locked --all-targets -- -W clippy::pedantic -W clippy::nursery
  shellcheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get update
      - run: sudo apt-get install -y shellcheck
      - run: cargo run --locked -- --print-bash > termfactor.generated.sh
      - run: shellcheck termfactor.generated.sh
